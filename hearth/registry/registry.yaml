apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      # Must run on the control-plane node: its hostPort 5000 is what the kind
      # extraPortMappings expose as localhost:5000 on the host.
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Equal
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Equal
      containers:
        - name: registry
          image: registry:3.1.1
          ports:
            - containerPort: 5000
              hostPort: 5000
              name: https
              protocol: TCP
          env:
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /etc/cert/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /etc/cert/tls.key
          volumeMounts:
            - name: registry-storage
              mountPath: /var/lib/registry
            - name: server-cert
              mountPath: /etc/cert
      volumes:
        - name: registry-storage
          emptyDir: {}
        - name: server-cert
          secret:
            secretName: tls-server-certificate
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: kube-system
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: registry
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: registry-ca
  namespace: kube-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: registry-cert
  namespace: kube-system
spec:
  additionalOutputFormats:
    - type: CombinedPEM
  dnsNames:
    - registry
    - registry.kube-system
    - registry.kube-system.svc
    - registry.kube-system.svc.cluster.local
    - localhost
  duration: 87600h0m0s
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: registry-ca
  privateKey:
    algorithm: ECDSA
    encoding: PKCS1
    size: 256
  renewBefore: 2400h0m0s
  secretName: tls-server-certificate
  subject:
    organizations:
      - athanor
  usages:
    - server auth
    - client auth
